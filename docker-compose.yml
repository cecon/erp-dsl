services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: erpdsl
      POSTGRES_PASSWORD: erpdsl
      POSTGRES_DB: erpdsl
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erpdsl"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8013:8013"
    environment:
      ERP_DATABASE_URL: postgresql://erpdsl:erpdsl@postgres:5432/erpdsl
      ERP_JWT_SECRET: super-secret-change-in-prod
      ERP_CORS_ORIGINS: '["http://localhost:5174","http://localhost:5175"]'
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8013/docs\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5174:5174"
    depends_on:
      backend:
        condition: service_healthy

  frontend-platform:
    build:
      context: .
      dockerfile: frontend-platform/Dockerfile
    ports:
      - "5175:5175"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
